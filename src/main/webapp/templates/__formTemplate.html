<!-- TODO: Template für ein Formular (z.B. Order, Registration, Edit) -->
<div class="form-container">
    <h2>Order Form</h2>

    <!--
    TODO: Formular mit verschiedenen Input-Feldern
        onsubmit="return false" verhindert Page Reload
        name-Attribute werden für Data Binding verwendet
    -->
    <form id="order-form" onsubmit="return false">

        <!-- TODO: Text Input -->
        <div class="form-group">
            <label for="name">Full Name *</label>
            <input type="text"
                   id="name"
                   name="name"
                   required
                   placeholder="Enter your full name">
        </div>

        <!-- TODO: Email Input -->
        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email"
                   id="email"
                   name="email"
                   required
                   placeholder="your.email@example.com">
        </div>

        <!-- TODO: Textarea -->
        <div class="form-group">
            <label for="address">Address *</label>
            <textarea id="address"
                      name="address"
                      rows="4"
                      required
                      placeholder="Enter your complete address"></textarea>
        </div>

        <!-- TODO: Select Dropdown -->
        <div class="form-group">
            <label for="country">Country *</label>
            <select id="country" name="country" required>
                <option value="">Please select...</option>
                <option value="CH">Switzerland</option>
                <option value="DE">Germany</option>
                <option value="AT">Austria</option>
            </select>
        </div>

        <!-- TODO: Checkbox -->
        <div class="form-group">
            <label>
                <input type="checkbox" name="newsletter" value="yes">
                Subscribe to newsletter
            </label>
        </div>

        <!-- TODO: Radio Buttons -->
        <div class="form-group">
            <label>Payment Method *</label>
            <label>
                <input type="radio" name="payment" value="credit-card" required>
                Credit Card
            </label>
            <label>
                <input type="radio" name="payment" value="paypal">
                PayPal
            </label>
            <label>
                <input type="radio" name="payment" value="invoice">
                Invoice
            </label>
        </div>

        <!-- TODO: Hidden Field (z.B. für ID oder ISBN) -->
        <input type="hidden" name="itemId" value="">

        <!-- TODO: Error Message Container -->
        <div class="error-message" style="display: none;">
            <p></p>
        </div>

        <!-- TODO: Submit und Cancel Buttons -->
        <div class="form-actions">
            <button type="submit" class="btn-primary" name="submit">
                Submit Order
            </button>
            <button type="button" class="btn-secondary" name="cancel">
                Cancel
            </button>
        </div>
    </form>
</div>
